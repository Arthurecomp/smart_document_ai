services:
  minio:
    image: quay.io/minio/minio
    container_name: smart_doc_minio
    restart: unless-stopped

    ports:
      - "9000:9000"
      - "9001:9001"

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password12345}

    command: server /data --console-address ":9001"

    volumes:
      - minio_storage:/data

    networks:
      - smart_doc_network

volumes:
  minio_storage:

networks:
  smart_doc_network:
    driver: bridge